services:
  api:
    build:
      context: .
    container_name: polymarket-bot-api
    env_file: .env
    environment:
      PROJECT_ROOT: /app
      RESOURCES_DIR: /app/resources
      OBSIDIAN_VAULT_DIR: /app/obsidian-vault
      EXTERNAL_AGENTS_DIR: /app/external-agents
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./resources:/app/resources
      - ./obsidian-vault:/app/obsidian-vault
      - ./external-agents:/app/external-agents
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: polymarket-bot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polymarket}
      POSTGRES_USER: ${POSTGRES_USER:-polymarket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polymarket} -d ${POSTGRES_DB:-polymarket}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: polymarket-bot-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: polymarket-bot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  n8n:
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:2.19.5}
    container_name: polymarket-bot-n8n
    env_file: .env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-polymarket}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-polymarket}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DB_POSTGRESDB_SCHEMA: n8n
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      N8N_PAYLOAD_SIZE_MAX: ${N8N_PAYLOAD_SIZE_MAX:-16}
      GENERIC_TIMEZONE: Europe/Paris
      TZ: Europe/Paris
      N8N_RUNNERS_ENABLED: "true"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      POLYBOT_API_URL: http://api:8000
      POLYBOT_AUTOMATION_SECRET: ${POLYBOT_AUTOMATION_SECRET}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./resources:/project/resources
      - ./obsidian-vault:/project/obsidian-vault
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  n8n-worker:
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:2.19.5}
    command: ["worker", "--concurrency=${N8N_WORKER_CONCURRENCY:-5}"]
    env_file: .env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-polymarket}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-polymarket}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DB_POSTGRESDB_SCHEMA: n8n
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      QUEUE_HEALTH_CHECK_ACTIVE: "true"
      N8N_GRACEFUL_SHUTDOWN_TIMEOUT: 30
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: polymarket-bot-dashboard
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-polymarket}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-polymarket}
      POLYBOT_API_HEALTH_URL: http://api:8000/health
      RESOURCES_DIR: /app/resources
      OBSIDIAN_VAULT_DIR: /app/obsidian-vault
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    volumes:
      - ./resources:/app/resources
      - ./obsidian-vault:/app/obsidian-vault
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=2)"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    profiles: ["observability"]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  n8n_data:
  prometheus_data:
  grafana_data:
